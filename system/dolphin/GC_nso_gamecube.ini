[Profile]
# NSO GameCube Controller (Switch 2) via the ngc BLE bridge -> SDL.
# Native GameCube layout: face buttons match the printed labels (A is the
# east/right button), real analog L/R triggers, and the C-stick on the right
# stick. The Device line is rewritten per-port by bazzite-controller-detect.py.
Device = SDL/0/NSO GameCube Controller
Buttons/A = `Button S`|SOUTH
Buttons/B = `Button E`|EAST
Buttons/X = `Button W`|WEST
Buttons/Y = `Button N`|NORTH
Buttons/Z = `Shoulder R`|`Full Axis 5+`
Buttons/Start = Start
Main Stick/Up = `Left Y+`
Main Stick/Down = `Left Y-`
Main Stick/Left = `Left X-`
Main Stick/Right = `Left X+`
Main Stick/Modifier = `Thumb L`
Main Stick/Calibration = 100.00 141.42 100.00 141.42 100.00 141.42 100.00 141.42
C-Stick/Up = `Right Y+`
C-Stick/Down = `Right Y-`
C-Stick/Left = `Right X-`
C-Stick/Right = `Right X+`
C-Stick/Modifier = `Thumb R`
C-Stick/Calibration = 100.00 141.42 100.00 141.42 100.00 141.42 100.00 141.42
Triggers/L = `Trigger L`
Triggers/R = `Trigger R`
Triggers/L-Analog = `Trigger L`
Triggers/R-Analog = `Trigger R`
D-Pad/Up = `Pad N`
D-Pad/Down = `Pad S`
D-Pad/Left = `Pad W`
D-Pad/Right = `Pad E`
Rumble/Motor = Motor
